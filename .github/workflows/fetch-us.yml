name: Fetch Stock Data

on:
  schedule:
    - cron: '0 9 * * *'  # 北京时间 17:00 = UTC 9:00
  workflow_dispatch:
    inputs:
      init:
        description: 'Initial full fetch'
        required: false
        default: 'false'
      source:
        description: 'Data source (all/csindex/yfinance/tushare)'
        required: false
        default: 'all'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests yfinance tushare

      - name: Run stock data fetch
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python scripts/fetch_data.py --source ${{ github.event.inputs.source }} --init ${{ github.event.inputs.init }}

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update stock data"
          git push